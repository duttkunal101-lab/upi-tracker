<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="Aria, your AI onboarding agent">
  <defs>
    <linearGradient id="aSkin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7D9BC"/><stop offset="100%" stop-color="#EBBE96"/>
    </linearGradient>
    <linearGradient id="aHair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B2230"/><stop offset="55%" stop-color="#241019"/><stop offset="100%" stop-color="#16090F"/>
    </linearGradient>
    <linearGradient id="aBlazer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#AE275F"/><stop offset="100%" stop-color="#6E0E37"/>
    </linearGradient>
    <radialGradient id="aSpark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF7E0"/><stop offset="55%" stop-color="#F2C94C"/><stop offset="100%" stop-color="#C7962B"/>
    </radialGradient>
    <radialGradient id="aGlow" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft premium backdrop -->
  <circle cx="60" cy="58" r="54" fill="url(#aGlow)"/>

  <!-- hair (back / bob) -->
  <path d="M60 15 C38 15 27 31 27 53 C27 69 31 82 38 92 C40 84 39.5 72 41 62 L43 62 C42 52 50 45 60 45 C70 45 78 52 77 62 L79 62 C80.5 72 80 84 82 92 C89 82 93 69 93 53 C93 31 82 15 60 15 Z" fill="url(#aHair)"/>

  <!-- shoulders / tailored blazer -->
  <path d="M22 120 C22 99 39 89 60 89 C81 89 98 99 98 120 Z" fill="url(#aBlazer)"/>
  <!-- cream blouse + lapels -->
  <path d="M50 90 L60 109 L70 90 Z" fill="#F8EFE7"/>
  <path d="M49 89 L60 105 L52 116 Z" fill="#8E1247"/><path d="M71 89 L60 105 L68 116 Z" fill="#8E1247"/>

  <!-- neck -->
  <path d="M53 78 C53 89 67 89 67 78 L67 70 L53 70 Z" fill="url(#aSkin)"/>
  <path d="M53 79 C53 84 67 84 67 79 L67 75 L53 75 Z" fill="#DCA67C" opacity="0.55"/>

  <!-- ears + studs -->
  <ellipse cx="36" cy="58" rx="4.6" ry="5.6" fill="url(#aSkin)"/><ellipse cx="84" cy="58" rx="4.6" ry="5.6" fill="url(#aSkin)"/>
  <circle cx="36" cy="62.5" r="1.5" fill="#F2C94C"/><circle cx="84" cy="62.5" r="1.5" fill="#F2C94C"/>

  <!-- face -->
  <path d="M38 50 C38 34 82 34 82 50 L82 58 C82 73 72 83 60 83 C48 83 38 73 38 58 Z" fill="url(#aSkin)"/>
  <!-- gentle face shading -->
  <path d="M60 79 C70 79 78 71 80 60 C78 74 70 81 60 81 C50 81 42 74 40 60 C42 71 50 79 60 79 Z" fill="#DCA67C" opacity="0.35"/>

  <!-- side-swept fringe (clean, one shape) -->
  <path d="M37 53 C36 35 84 33 83 53 C80 44 70 40 60 40 C49 40 41 44 37 53 Z" fill="url(#aHair)"/>
  <path d="M37 52 C41 45 50 47 52 56 C47 50 40 50 37 56 Z" fill="url(#aHair)"/>

  <!-- brows -->
  <path d="M45.5 53 Q51 50.5 56 53" stroke="#2A1820" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M64 53 Q69 50.5 74.5 53" stroke="#2A1820" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- eyes (almond, refined) -->
  <path d="M46 59 Q50.5 55.5 55 59 Q50.5 62 46 59 Z" fill="#fff"/>
  <path d="M65 59 Q69.5 55.5 74 59 Q69.5 62 65 59 Z" fill="#fff"/>
  <circle cx="50.6" cy="58.7" r="2.5" fill="#3A2230"/><circle cx="69.4" cy="58.7" r="2.5" fill="#3A2230"/>
  <circle cx="49.7" cy="57.9" r="0.85" fill="#fff"/><circle cx="68.5" cy="57.9" r="0.85" fill="#fff"/>
  <path d="M45.6 58.6 Q50.5 54.6 55.4 58.6" stroke="#2A1820" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M64.6 58.6 Q69.5 54.6 74.4 58.6" stroke="#2A1820" stroke-width="1.4" stroke-linecap="round" fill="none"/>

  <!-- nose + soft lips -->
  <path d="M60 61 L58.6 66 Q60 67 61.4 66" stroke="#D89C72" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  <path d="M54 71 Q60 75 66 71 Q60 73.5 54 71 Z" fill="#C76B7C"/>
  <path d="M54 71 Q60 73 66 71" stroke="#A84A5E" stroke-width="0.9" fill="none"/>

  <!-- subtle warmth -->
  <ellipse cx="45" cy="67" rx="3" ry="2.1" fill="#EC9DAE" opacity="0.28"/><ellipse cx="75" cy="67" rx="3" ry="2.1" fill="#EC9DAE" opacity="0.28"/>

  <!-- discreet headset -->
  <path d="M35 54 Q34 33 60 31" stroke="#241019" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="32.5" y="55" width="5.4" height="9" rx="2.7" fill="#241019"/>
  <path d="M35.2 64 Q35 72 45 73" stroke="#241019" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <circle cx="46" cy="73" r="1.9" fill="#AE275F"/>

  <!-- elegant AI spark -->
  <g transform="translate(88 31)"><circle r="3.6" fill="url(#aSpark)"/><path d="M0 -6 L0 6 M-6 0 L6 0" stroke="#F2C94C" stroke-width="1.3" stroke-linecap="round" opacity="0.85"/></g>
</svg>
